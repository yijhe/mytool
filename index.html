<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共同記帳｜家庭與夥伴的透明帳本（雲端版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
<style>
:root{
  --ink:#16241D; --ink-soft:#223328; --ink-line:#33453A;
  --paper:#F4F7F0; --paper-line:#E1EADB; --card:#FFFFFF;
  --gold:#B8924A; --gold-soft:#EAD9AF; --gold-deep:#8C6A30;
  --credit:#2F6B4F; --credit-soft:#E2EFE6;
  --debit:#A23B33; --debit-soft:#F6E4E1;
  --text:#1F2A22; --text-soft:#5C6B5F; --text-faint:#8A988D;
  --border:#D9E1D3; --radius:14px; --radius-sm:9px;
  --shadow:0 10px 28px -10px rgba(22,36,29,0.22); --shadow-sm:0 4px 12px -4px rgba(22,36,29,0.16);
  font-size:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;color:var(--text);background:var(--paper);-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Fraunces','Noto Serif TC',Georgia,serif;}
button{font-family:inherit;}
.hidden{display:none !important;}
.mono,.amount,.num{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 18% 20%, rgba(184,146,74,0.10), transparent 45%),radial-gradient(circle at 85% 80%, rgba(47,107,79,0.10), transparent 45%),var(--ink);padding:24px;}
.auth-card{width:100%;max-width:460px;background:var(--paper);border-radius:18px;padding:36px 32px;box-shadow:0 30px 60px -20px rgba(0,0,0,0.45);border:1px solid rgba(184,146,74,0.25);}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.auth-mark{width:40px;height:40px;border-radius:10px;background:var(--ink);color:var(--gold-soft);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;font-weight:600;flex-shrink:0;}
.auth-brand h1{font-size:21px;margin:0;letter-spacing:.02em;}
.auth-sub{color:var(--text-soft);font-size:13.5px;margin:2px 0 24px;line-height:1.65;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;color:var(--text-soft);margin-bottom:6px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:14.5px;color:var(--text);transition:border-color .15s,box-shadow .15s;}
.field textarea{min-height:140px;font-family:'IBM Plex Mono',monospace;font-size:12px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,146,74,0.18);}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.field-hint{font-size:12px;color:var(--text-faint);margin-top:10px;line-height:1.6;}
.btn{appearance:none;border:1px solid transparent;border-radius:var(--radius-sm);padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s,box-shadow .12s,background .15s,border-color .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:translateY(1px);}
.btn:focus-visible{outline:2px solid var(--gold-deep);outline-offset:2px;}
.btn.primary{background:var(--ink);color:#F4ECD8;}
.btn.primary:hover{background:var(--ink-soft);}
.btn.gold{background:var(--gold);color:#fff;}
.btn.gold:hover{background:var(--gold-deep);}
.btn.ghost{background:transparent;border-color:var(--border);color:var(--text-soft);}
.btn.ghost:hover{border-color:var(--text-soft);color:var(--text);}
.btn.danger{background:var(--debit);color:#fff;}
.btn.danger:hover{background:#832B25;}
.btn.block{width:100%;}
.btn.small{padding:6px 12px;font-size:12.5px;}
.btn.icon{padding:6px 9px;font-size:13px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn.google-btn{background:#fff;color:#3c4043;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
.btn.google-btn:hover{border-color:#c7cdd1;}
.g-logo{width:18px;height:18px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#4285F4;border:1px solid var(--border);}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--text-soft);}
.auth-switch a{color:var(--gold-deep);cursor:pointer;font-weight:600;text-decoration:none;}
.ledger-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.ledger-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;}
.ledger-item:hover{border-color:var(--gold);background:#fff;}
.ledger-item .nm{font-weight:700;font-size:14.5px;}
.ledger-item .rl{font-size:11.5px;color:var(--text-faint);}
.divider-line{display:flex;align-items:center;gap:10px;color:var(--text-faint);font-size:11.5px;margin:18px 0;}
.divider-line::before,.divider-line::after{content:"";flex:1;height:1px;background:var(--border);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.app-shell{display:flex;min-height:100vh;animation:fadeIn .45s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.sidebar{width:252px;flex-shrink:0;background:var(--ink);color:#EFE9DA;display:flex;flex-direction:column;gap:22px;padding:26px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:11px;padding:0 6px;}
.brand .auth-mark{background:var(--gold-soft);color:var(--ink);}
.brand-text strong{display:block;font-size:16px;letter-spacing:.02em;color:#F4ECD8;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.brand-text small{display:block;font-size:11px;color:#9FAE9A;margin-top:1px;}
.tabs{display:flex;flex-direction:column;gap:3px;}
.tab-btn{text-align:left;background:transparent;border:none;color:#C9D3C3;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;display:flex;align-items:center;gap:10px;}
.tab-btn:hover{background:var(--ink-soft);color:#fff;}
.tab-btn.active{background:var(--gold);color:#1B1505;}
.tab-btn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;flex-shrink:0;}
.sidebar-spacer{flex:1;}
.account-card{background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:12px;padding:14px;}
.account-card .who{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.account-card .who .meta .nm{font-size:13.5px;font-weight:700;color:#F4ECD8;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.account-card .who .meta .rl{font-size:11px;color:#9FAE9A;}
.account-card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.account-card-actions .btn{flex:1;font-size:12px;padding:7px 8px;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}

.main{flex:1;min-width:0;padding:30px 36px 60px;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.topbar h1{font-size:26px;margin:0;}
.topbar p{margin:4px 0 0;color:var(--text-soft);font-size:13.5px;}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.read-only-banner{background:var(--gold-soft);color:var(--gold-deep);border:1px solid var(--gold);padding:9px 14px;border-radius:9px;font-size:12.5px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.card-pad{padding:20px 22px;}
.section-title{font-size:15px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.section-title small{font-size:12px;color:var(--text-faint);font-weight:500;}
.pill-toggle{display:inline-flex;background:var(--paper-line);border-radius:999px;padding:3px;gap:2px;}
.pill-toggle button{border:none;background:transparent;padding:7px 16px;border-radius:999px;font-size:13px;font-weight:600;color:var(--text-soft);cursor:pointer;transition:background .15s,color .15s;}
.pill-toggle button.active{background:var(--ink);color:#F4ECD8;}
.period-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.period-nav{display:flex;align-items:center;gap:6px;}
.period-nav button{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:14px;color:var(--text-soft);display:flex;align-items:center;justify-content:center;}
.period-nav button:hover{border-color:var(--gold);color:var(--gold-deep);}
.period-label{font-size:13.5px;font-weight:700;color:var(--text);min-width:140px;text-align:center;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
.stat-card .label{font-size:12.5px;color:var(--text-soft);font-weight:600;display:flex;align-items:center;gap:6px;}
.stat-card .value{font-size:25px;font-weight:600;margin-top:8px;}
.stat-card.income .value{color:var(--credit);}
.stat-card.expense .value{color:var(--debit);}
.stat-card .delta{font-size:12px;margin-top:6px;color:var(--text-faint);}
.stat-card .delta.up{color:var(--credit);}
.stat-card .delta.down{color:var(--debit);}
.stamp-card{display:flex;align-items:center;gap:16px;}
.stamp{width:64px;height:64px;border-radius:50%;border:2.5px solid var(--gold);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:var(--gold-deep);position:relative;box-shadow:inset 0 0 0 3px rgba(184,146,74,0.12);transform:rotate(-4deg);}
.stamp::after{content:"";position:absolute;inset:5px;border:1px dashed rgba(184,146,74,0.5);border-radius:50%;}
.stamp small{font-size:9px;letter-spacing:.08em;}
.bar-row{margin-bottom:12px;}
.bar-row:last-child{margin-bottom:0;}
.bar-row .bar-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
.bar-row .bar-top .nm{font-weight:600;color:var(--text);}
.bar-row .bar-top .v{color:var(--text-soft);}
.bar-track{height:8px;border-radius:6px;background:var(--paper-line);overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.bar-fill.income{background:var(--credit);}
.bar-fill.expense{background:var(--debit);}
.chart-wrap{overflow-x:auto;padding-bottom:6px;}
.chart-columns{display:flex;align-items:flex-end;gap:6px;height:150px;min-width:max-content;padding:0 4px;}
.chart-col{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0;height:100%;justify-content:center;position:relative;}
.chart-col .bars{display:flex;flex-direction:column;align-items:center;width:14px;height:118px;justify-content:center;}
.chart-col .bar-up{width:100%;background:var(--credit);border-radius:3px 3px 0 0;min-height:1px;}
.chart-col .bar-down{width:100%;background:var(--debit);border-radius:0 0 3px 3px;min-height:1px;}
.chart-col .axis{width:100%;height:1px;background:var(--border);}
.chart-col .dlabel{font-size:10px;color:var(--text-faint);margin-top:6px;white-space:nowrap;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{text-align:left;font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;font-weight:700;padding:0 12px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:11px 12px;border-bottom:1px solid var(--paper-line);vertical-align:middle;}
tbody tr:hover{background:var(--paper-line);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;}
.badge.income{background:var(--credit-soft);color:var(--credit);}
.badge.expense{background:var(--debit-soft);color:var(--debit);}
.badge.role-main{background:var(--gold-soft);color:var(--gold-deep);}
.badge.role-sub{background:var(--paper-line);color:var(--text-soft);}
.badge.status-on{background:var(--credit-soft);color:var(--credit);}
.badge.status-off{background:#EEE;color:var(--text-faint);}
.cell-amount{text-align:right;font-weight:700;}
.cell-amount.income{color:var(--credit);}
.cell-amount.expense{color:var(--debit);}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.member-chip{display:inline-flex;align-items:center;gap:6px;}
.member-chip .avatar{width:20px;height:20px;font-size:10px;}
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;}
.filter-bar .field{margin-bottom:0;min-width:130px;}
.filter-bar .field.grow{flex:1;min-width:160px;}
.filter-bar label{font-size:11px;}
.empty-state{text-align:center;padding:46px 20px;color:var(--text-faint);}
.empty-state .ico{font-size:28px;margin-bottom:10px;}
.empty-state p{margin:4px 0 0;font-size:13.5px;}
.cat-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff;}
.cat-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cat-card-head .nm{font-weight:700;font-size:14.5px;}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--paper-line);border-radius:999px;padding:5px 6px 5px 12px;font-size:12.5px;color:var(--text);}
.chip button{border:none;background:rgba(0,0,0,0.08);color:var(--text-soft);width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;}
.chip button:hover{background:var(--debit);color:#fff;}
.chip-add{display:flex;gap:6px;margin-top:10px;}
.chip-add input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;}
.modal-overlay{position:fixed;inset:0;background:rgba(22,36,29,0.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:200;backdrop-filter:blur(2px);}
.modal-box{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:0 30px 60px -15px rgba(0,0,0,0.4);animation:popIn .18s ease;position:relative;}
@keyframes popIn{from{opacity:0;transform:scale(.97) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-box h3{margin:0 0 4px;font-size:18px;}
.modal-box .modal-sub{color:var(--text-soft);font-size:12.5px;margin:0 0 18px;}
.modal-message{font-size:14.5px;color:var(--text);line-height:1.6;margin:6px 0 20px;}
.modal-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;margin-bottom:12px;background:var(--gold-soft);color:var(--gold-deep);}
.modal-icon.danger{background:var(--debit-soft);color:var(--debit);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
.modal-close{position:absolute;top:18px;right:18px;background:transparent;border:none;font-size:18px;cursor:pointer;color:var(--text-faint);}
.toast-container{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:300;max-width:320px;}
.toast{background:var(--ink);color:#F4ECD8;padding:12px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;border-left:4px solid var(--gold);}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{border-left-color:var(--debit);}
.toast.success{border-left-color:var(--credit);}
.backup-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid var(--paper-line);flex-wrap:wrap;}
.backup-row:last-child{border-bottom:none;}
.backup-row .info strong{display:block;font-size:14px;margin-bottom:3px;}
.backup-row .info span{font-size:12.5px;color:var(--text-soft);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--credit);display:inline-block;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
footer.app-foot{text-align:center;color:var(--text-faint);font-size:11.5px;margin-top:30px;display:flex;align-items:center;justify-content:center;gap:7px;}
@media (max-width:980px){.stat-grid{grid-template-columns:1fr;}.two-col{grid-template-columns:1fr;}}
@media (max-width:880px){
  .app-shell{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;padding:14px 16px;gap:14px;overflow-x:auto;}
  .brand{flex-shrink:0;}
  .tabs{flex-direction:row;}
  .tab-btn{white-space:nowrap;}
  .sidebar-spacer{display:none;}
  .account-card{flex-shrink:0;width:auto;min-width:200px;}
  .main{padding:20px 16px 50px;}
  .topbar h1{font-size:21px;}
}
@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<div id="configScreen" class="auth-screen hidden"><div class="auth-card" id="configCard"></div></div>
<div id="authScreen" class="auth-screen hidden"><div class="auth-card" id="authCard"></div></div>
<div id="pickScreen" class="auth-screen hidden"><div class="auth-card" id="pickCard"></div></div>

<div id="appScreen" class="app-shell hidden">
  <aside class="sidebar">
    <div class="brand">
      <div class="auth-mark">帳</div>
      <div class="brand-text"><strong id="ledgerNameDisplay">共同記帳</strong><small><span class="sync-dot"></span> 雲端同步中</small></div>
    </div>
    <nav class="tabs" id="navTabs">
      <button class="tab-btn" data-tab="overview"><span class="dot"></span>總覽</button>
      <button class="tab-btn" data-tab="entries"><span class="dot"></span>記帳明細</button>
      <button class="tab-btn" data-tab="categories"><span class="dot"></span>分類管理</button>
      <button class="tab-btn" data-tab="members"><span class="dot"></span>成員管理</button>
      <button class="tab-btn" data-tab="backup"><span class="dot"></span>備份與帳本</button>
    </nav>
    <div class="sidebar-spacer"></div>
    <div class="account-card" id="accountCard"></div>
  </aside>
  <main class="main">
    <div id="tabContent"></div>
    <footer class="app-foot">資料即時同步至 Firebase 雲端，所有成員都能看到最新內容。</footer>
  </main>
</div>

<div id="modalOverlay" class="modal-overlay hidden"><div class="modal-box" id="modalBox"></div></div>
<div id="toastContainer" class="toast-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, addDoc, collection,
  query, where, onSnapshot, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* =========================================================
   常數與工具
========================================================= */
const FB_CONFIG_KEY = "coLedger_fbConfig_v1";
const LAST_LEDGER_KEY = "coLedger_lastLedger_v1";
const AVATAR_COLORS = ["#2F6B4F","#B8924A","#A23B33","#3E6FA0","#7A5DA8","#B06A2E","#4F8C7A"];

function uid(){ return "id_" + Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
function pad(n){ return String(n).padStart(2,"0"); }
function normEmail(e){ return String(e||"").trim().toLowerCase(); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function fmtMoney(n){ n=Number(n)||0; const sign=n<0?"-":""; return sign+"$"+Math.abs(Math.round(n)).toLocaleString("zh-TW"); }
function fmtDateInput(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function parseDateInput(str){ const [y,m,d]=str.split("-").map(Number); return new Date(y,m-1,d); }
function todayStr(){ return fmtDateInput(new Date()); }
function fmtDateHuman(str){ if(!str) return "—"; const d=parseDateInput(str); const wk=["日","一","二","三","四","五","六"][d.getDay()]; return d.getMonth()+1+"/"+d.getDate()+"（"+wk+"）"; }
function avatarColor(seed){ let h=0; for(let i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))%AVATAR_COLORS.length; return AVATAR_COLORS[(h+AVATAR_COLORS.length)%AVATAR_COLORS.length]; }
function dateToISOWeekString(d){ const date=new Date(d.getTime()); date.setHours(0,0,0,0); date.setDate(date.getDate()+3-((date.getDay()+6)%7)); const week1=new Date(date.getFullYear(),0,4); const weekNo=1+Math.round(((date-week1)/86400000-3+((week1.getDay()+6)%7))/7); return date.getFullYear()+"-W"+pad(weekNo); }
function isoWeekToRange(weekStr){ const [yearStr,weekPart]=weekStr.split("-W"); const year=parseInt(yearStr,10), week=parseInt(weekPart,10); const jan4=new Date(year,0,4); const jan4Day=(jan4.getDay()+6)%7; const week1Monday=new Date(jan4); week1Monday.setDate(jan4.getDate()-jan4Day); const start=new Date(week1Monday); start.setDate(week1Monday.getDate()+(week-1)*7); const end=new Date(start); end.setDate(start.getDate()+6); return {start,end}; }
function monthToRange(monthStr){ const [y,m]=monthStr.split("-").map(Number); const start=new Date(y,m-1,1); const end=new Date(y,m,0); return {start,end}; }
function shiftMonthStr(monthStr,dir){ const [y,m]=monthStr.split("-").map(Number); const d=new Date(y,m-1+dir,1); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
function defaultCategories(){
  const mk=(name,subs)=>({id:uid(),name,subs:subs.map(s=>({id:uid(),name:s}))});
  return {
    income:[mk("薪資所得",["月薪","獎金"]),mk("投資收益",["股利","利息"]),mk("其他收入",["紅包","退款"])],
    expense:[mk("飲食",["早餐","午餐","晚餐","飲料"]),mk("交通",["油資","停車","大眾運輸"]),mk("居住",["房租房貸","水電瓦斯","修繕"]),mk("娛樂",["電影","旅遊","訂閱服務"]),mk("醫療保健",["看診","藥品"]),mk("教育學習",["書籍","課程"]),mk("其他支出",["雜支","人情"])]
  };
}

/* =========================================================
   Toast / Modal
========================================================= */
function toast(msg,type){
  const wrap=document.getElementById("toastContainer");
  const el=document.createElement("div"); el.className="toast"+(type?" "+type:""); el.textContent=msg;
  wrap.appendChild(el); requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),280); },3200);
}
function openModal(html){
  document.getElementById("modalBox").innerHTML=html;
  document.getElementById("modalOverlay").classList.remove("hidden");
  const fi=document.querySelector("#modalBox input, #modalBox select, #modalBox textarea");
  if(fi) setTimeout(()=>fi.focus(),30);
}
function closeModal(){ document.getElementById("modalOverlay").classList.add("hidden"); document.getElementById("modalBox").innerHTML=""; }
function showConfirm(message,onConfirm,opts){
  opts=opts||{}; const danger=opts.danger?"danger":"";
  openModal('<button class="modal-close" data-action="modal-close">✕</button>'+
    '<div class="modal-icon '+danger+'">'+(opts.danger?"!":"?")+'</div>'+
    '<p class="modal-message">'+escapeHtml(message)+'</p>'+
    '<div class="modal-actions"><button class="btn ghost" data-action="modal-close">取消</button>'+
    '<button class="btn '+(opts.danger?"danger":"primary")+'" id="modalConfirmBtn">'+(opts.confirmLabel||"確定")+'</button></div>');
  document.getElementById("modalConfirmBtn").onclick=function(){ closeModal(); onConfirm(); };
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape" && !document.getElementById("modalOverlay").classList.contains("hidden")) closeModal(); });
document.getElementById("modalOverlay").addEventListener("click",e=>{ if(e.target.id==="modalOverlay") closeModal(); });

function explainError(err){
  if(!err) return "發生未知錯誤";
  if(err.code==="permission-denied") return "權限不足：僅主帳號可以執行這個操作";
  return err.message || String(err);
}

async function enterLedgerFlow(){
  renderPickLoading();
  let ledgers;
  try{ ledgers = await discoverLedgers(); }
  catch(err){ toast("讀取帳本失敗："+explainError(err),"error"); ledgers=[]; }
  hideAllScreens();
  document.getElementById("pickScreen").classList.remove("hidden");
  if(ledgers.length===0){
    renderNewLedgerForm("嗨 "+(fbUser.displayName||fbUser.email)+"，你目前還沒有加入任何帳本。如果主帳號已經把你的 Google 信箱（"+fbUser.email+"）加入帳本，請點選下方「重新檢查邀請」；或者你也可以建立一個全新的帳本。");
    return;
  }
  const lastId = localStorage.getItem(LAST_LEDGER_KEY);
  if(ledgers.length===1){ localStorage.setItem(LAST_LEDGER_KEY, ledgers[0].id); openLedger(ledgers[0].id); return; }
  if(lastId && ledgers.some(l=>l.id===lastId)){ openLedger(lastId); return; }
  renderLedgerPicker(ledgers);
}

   帳本：即時監聽 / 資料鏡像
========================================================= */
let fbUser=null;
let currentLedgerId=null, ledgerRaw=null;
let unsubLedger=null, unsubEntries=null;
let state={ meta:{ledgerName:"共同記帳"}, accounts:[], categories:{income:[],expense:[]}, entries:[] };

function rebuildStateFromLedger(){
  const membersMap = ledgerRaw.members || {};
  state.meta.ledgerName = ledgerRaw.name || "共同記帳";
  state.accounts = Object.keys(membersMap).map(email=>({
    id: email, email, name: membersMap[email].name || email,
    role: membersMap[email].role || "sub", active: membersMap[email].active!==false
  }));
  state.categories = ledgerRaw.categories || defaultCategories();
}
function currentAccount(){ if(!fbUser) return null; return state.accounts.find(a=>a.id===normEmail(fbUser.email)) || null; }
function isMain(){ const a=currentAccount(); return !!a && a.role==="main"; }
function ledgerRef(){ return doc(fbDb,"ledgers",currentLedgerId); }
async function saveMembers(membersMap){
  const memberEmails = Object.keys(membersMap).filter(e=>membersMap[e].active!==false);
  await updateDoc(ledgerRef(), { members: membersMap, memberEmails });
}
async function saveCategories(){ await updateDoc(ledgerRef(), { categories: state.categories }); }

function teardownLedger(){
  if(unsubLedger) unsubLedger(); if(unsubEntries) unsubEntries();
  unsubLedger=null; unsubEntries=null; currentLedgerId=null; ledgerRaw=null;
  state={ meta:{ledgerName:"共同記帳"}, accounts:[], categories:{income:[],expense:[]}, entries:[] };
}

function openLedger(ledgerId){
  teardownLedger();
  currentLedgerId = ledgerId;
  hideAllScreens();
  document.getElementById("appScreen").classList.remove("hidden");

  unsubLedger = onSnapshot(doc(fbDb,"ledgers",ledgerId), snap=>{
    if(!snap.exists()){
      toast("這個帳本已被刪除","error"); teardownLedger(); enterLedgerFlow(); return;
    }
    ledgerRaw = snap.data();
    rebuildStateFromLedger();
    if(!currentAccount()){
      toast("你已不在這個帳本的成員名單中","error"); teardownLedger(); enterLedgerFlow(); return;
    }
    renderShell();
  }, err=>{ toast("帳本同步發生錯誤："+explainError(err),"error"); });

  const entriesQuery = query(collection(fbDb,"ledgers",ledgerId,"entries"), orderBy("date","desc"));
  unsubEntries = onSnapshot(entriesQuery, snap=>{
    state.entries = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=> b.date===a.date ? (b.createdAt-a.createdAt) : (b.date<a.date?-1:1));
    renderTab();
  }, err=>{ toast("明細同步發生錯誤："+explainError(err),"error"); });
}

/* =========================================================
   統計計算
========================================================= */
function getPeriodRange(type,value){
  if(type==="day") return {start:parseDateInput(value), end:parseDateInput(value), label:fmtDateHuman(value)+" 當日"};
  if(type==="week"){ const {start,end}=isoWeekToRange(value); return {start,end,label:(start.getMonth()+1)+"/"+start.getDate()+" – "+(end.getMonth()+1)+"/"+end.getDate()+" 這一週"}; }
  const {start,end}=monthToRange(value); return {start,end,label:start.getFullYear()+" 年 "+(start.getMonth()+1)+" 月"};
}
function inRange(dateStr,start,end){ const s=fmtDateInput(start), e=fmtDateInput(end); return dateStr>=s && dateStr<=e; }
function aggregate(start,end){
  const entries=state.entries.filter(en=>inRange(en.date,start,end));
  let incomeTotal=0, expenseTotal=0; const byCatIncome={}, byCatExpense={}, byMember={};
  entries.forEach(en=>{
    const amt=Number(en.amount)||0;
    if(en.type==="income"){ incomeTotal+=amt; byCatIncome[en.categoryId]=(byCatIncome[en.categoryId]||0)+amt; }
    else { expenseTotal+=amt; byCatExpense[en.categoryId]=(byCatExpense[en.categoryId]||0)+amt; }
    if(!byMember[en.memberId]) byMember[en.memberId]={income:0,expense:0};
    byMember[en.memberId][en.type]+=amt;
  });
  return {entries, incomeTotal, expenseTotal, net:incomeTotal-expenseTotal, byCatIncome, byCatExpense, byMember};
}
function categoryName(type,catId){ const c=(state.categories[type]||[]).find(x=>x.id===catId); return c?c.name:"（未分類）"; }
function subName(type,catId,subId){ const c=(state.categories[type]||[]).find(x=>x.id===catId); if(!c) return ""; const s=(c.subs||[]).find(x=>x.id===subId); return s?s.name:""; }

/* =========================================================
   總覽分頁
========================================================= */
let overviewState={type:"day", value:todayStr()};
function ensureOverviewDefault(){
  if(overviewState.type==="week" && !overviewState.value.includes("W")) overviewState.value=dateToISOWeekString(new Date());
  if(overviewState.type==="month" && overviewState.value.length!==7) overviewState.value=todayStr().slice(0,7);
}
function shiftOverviewPeriod(dir){
  if(overviewState.type==="day"){ const d=parseDateInput(overviewState.value); d.setDate(d.getDate()+dir); overviewState.value=fmtDateInput(d); }
  else if(overviewState.type==="week"){ const {start}=isoWeekToRange(overviewState.value); start.setDate(start.getDate()+dir*7); overviewState.value=dateToISOWeekString(start); }
  else { overviewState.value=shiftMonthStr(overviewState.value,dir); }
  renderOverviewTab();
}
function renderOverviewTab(){
  ensureOverviewDefault();
  const range=getPeriodRange(overviewState.type, overviewState.value);
  const cur=aggregate(range.start, range.end);
  let prevStart, prevEnd;
  if(overviewState.type==="day"){ prevStart=new Date(range.start); prevStart.setDate(prevStart.getDate()-1); prevEnd=prevStart; }
  else if(overviewState.type==="week"){ prevStart=new Date(range.start); prevStart.setDate(prevStart.getDate()-7); prevEnd=new Date(range.end); prevEnd.setDate(prevEnd.getDate()-7); }
  else { const r=monthToRange(shiftMonthStr(overviewState.value,-1)); prevStart=r.start; prevEnd=r.end; }
  const prev=aggregate(prevStart, prevEnd);
  function deltaHtml(curV,prevV){
    if(prevV===0 && curV===0) return '<div class="delta">與上期相同</div>';
    if(prevV===0) return '<div class="delta up">較上期新增</div>';
    const pct=Math.round(((curV-prevV)/Math.abs(prevV))*100); const cls=pct>=0?"up":"down";
    return '<div class="delta '+cls+'">較上期 '+(pct>=0?"+":"")+pct+'%</div>';
  }
  function barsHtml(byCat,type,total){
    const list=state.categories[type]||[];
    const rows=list.map(c=>({name:c.name, v:byCat[c.id]||0})).filter(r=>r.v>0).sort((a,b)=>b.v-a.v);
    if(rows.length===0) return '<div class="empty-state" style="padding:24px 10px;"><p>此期間沒有'+(type==="income"?"收入":"支出")+'紀錄</p></div>';
    return rows.map(r=>{ const pct=total>0?Math.round((r.v/total)*100):0;
      return '<div class="bar-row"><div class="bar-top"><span class="nm">'+escapeHtml(r.name)+'</span><span class="v">'+fmtMoney(r.v)+'・'+pct+'%</span></div><div class="bar-track"><div class="bar-fill '+type+'" style="width:'+pct+'%"></div></div></div>';
    }).join("");
  }
  let chartHtml="";
  if(overviewState.type!=="day"){
    const days=[]; let d=new Date(range.start);
    while(d<=range.end){ days.push(new Date(d)); d.setDate(d.getDate()+1); }
    const dayAggs=days.map(dd=>{ const ds=fmtDateInput(dd); let inc=0,exp=0;
      state.entries.forEach(en=>{ if(en.date===ds){ if(en.type==="income") inc+=Number(en.amount)||0; else exp+=Number(en.amount)||0; } });
      return {date:dd, inc, exp};
    });
    const maxV=Math.max(1, ...dayAggs.map(a=>Math.max(a.inc,a.exp)));

function periodInputHtml(){

function bindOverviewEvents(){
  document.querySelectorAll("#periodTypeToggle button").forEach(btn=>{

========================================================= */
let entryFilter={start:"",end:"",type:"all",categoryId:"",memberId:"",keyword:"",page:1};
const PAGE_SIZE=12;
function filteredEntries(){
  return state.entries.filter(en=>{
    if(entryFilter.start && en.date<entryFilter.start) return false;
    if(entryFilter.end && en.date>entryFilter.end) return false;
    if(entryFilter.type!=="all" && en.type!==entryFilter.type) return false;
    if(entryFilter.categoryId && en.categoryId!==entryFilter.categoryId) return false;
    if(entryFilter.memberId && en.memberId!==entryFilter.memberId) return false;
    if(entryFilter.keyword){ const kw=entryFilter.keyword.toLowerCase(); if(!(en.note||"").toLowerCase().includes(kw)) return false; }
    return true;
  });
}
function categoryOptionsHtml(type,selected){ return '<option value="">請選擇分類</option>'+(state.categories[type]||[]).map(c=>'<option value="'+c.id+'"'+(c.id===selected?" selected":"")+'>'+escapeHtml(c.name)+'</option>').join(""); }
function subOptionsHtml(type,catId,selected){ const cat=(state.categories[type]||[]).find(c=>c.id===catId); const subs=cat?(cat.subs||[]):[]; if(subs.length===0) return '<option value="">（此分類沒有明細項目）</option>'; return '<option value="">不指定明細</option>'+subs.map(s=>'<option value="'+s.id+'"'+(s.id===selected?" selected":"")+'>'+escapeHtml(s.name)+'</option>').join(""); }
function memberOptionsHtml(selected){ return state.accounts.filter(a=>a.active).map(a=>'<option value="'+a.id+'"'+(a.id===selected?" selected":"")+'>'+escapeHtml(a.name)+(a.role==="main"?"（主帳號）":"")+'</option>').join(""); }

function renderEntriesTab(){
  const all=filteredEntries();
  const totalPages=Math.max(1, Math.ceil(all.length/PAGE_SIZE));
  entryFilter.page=Math.min(entryFilter.page, totalPages);
  const pageItems=all.slice((entryFilter.page-1)*PAGE_SIZE, entryFilter.page*PAGE_SIZE);
  const rowsHtml = pageItems.length===0
    ? '<tr><td colspan="7"><div class="empty-state"><div class="ico">📭</div><p>沒有符合條件的記帳明細'+(isMain()?'，點選右上方「新增明細」開始記錄第一筆帳。':'。')+'</p></div></td></tr>'
    : pageItems.map(en=>{
        const cat=categoryName(en.type, en.categoryId); const sub=subName(en.type, en.categoryId, en.subId);
        const acc=state.accounts.find(a=>a.id===en.memberId);
        return '<tr><td>'+fmtDateHuman(en.date)+'</td><td><span class="badge '+en.type+'">'+(en.type==="income"?"收入":"支出")+'</span></td>'+
          '<td>'+escapeHtml(cat)+(sub?' › '+escapeHtml(sub):'')+'</td>'+
          '<td><span class="member-chip"><span class="avatar" style="background:'+avatarColor(en.memberId||"?")+'">'+escapeHtml((acc?acc.name:"?").charAt(0))+'</span>'+escapeHtml(acc?acc.name:"（已移除成員）")+'</span></td>'+
          '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+escapeHtml(en.note||"")+'">'+escapeHtml(en.note||"—")+'</td>'+
          '<td class="cell-amount '+en.type+' num">'+(en.type==="income"?"+":"−")+fmtMoney(en.amount)+'</td>'+
          '<td>'+(isMain()?'<div class="row-actions"><button class="btn ghost icon" data-action="edit-entry" data-id="'+en.id+'">✎</button><button class="btn ghost icon" data-action="delete-entry" data-id="'+en.id+'">🗑</button></div>':'')+'</td></tr>';
      }).join("");
  document.getElementById("tabContent").innerHTML =
    '<div class="topbar"><div><h1>記帳明細</h1><p>共 '+all.length+' 筆紀錄</p></div>'+
      '<div class="topbar-actions">'+(isMain()?'<button class="btn gold" data-action="add-entry">＋ 新增明細</button>':'')+'</div></div>'+
    (isMain()?"":'<div class="read-only-banner">👁 您目前為子帳號，僅能檢視明細，無法新增、編輯或刪除。</div>')+
    '<div class="card card-pad" style="margin-bottom:16px;"><div class="filter-bar">'+
      '<div class="field"><label>起始日期</label><input type="date" id="f_start" value="'+entryFilter.start+'"></div>'+
      '<div class="field"><label>結束日期</label><input type="date" id="f_end" value="'+entryFilter.end+'"></div>'+
      '<div class="field"><label>類型</label><select id="f_type"><option value="all"'+(entryFilter.type==="all"?" selected":"")+'>全部</option><option value="income"'+(entryFilter.type==="income"?" selected":"")+'>收入</option><option value="expense"'+(entryFilter.type==="expense"?" selected":"")+'>支出</option></select></div>'+
      '<div class="field"><label>成員</label><select id="f_member"><option value="">全部成員</option>'+memberOptionsHtml(entryFilter.memberId)+'</select></div>'+
      '<div class="field grow"><label>備註關鍵字</label><input type="text" id="f_keyword" placeholder="搜尋備註內容" value="'+escapeHtml(entryFilter.keyword)+'"></div>'+
      '<button class="btn ghost small" data-action="clear-filter">清除篩選</button></div></div>'+
    '<div class="card"><div class="table-wrap"><table><thead><tr><th>日期</th><th>類型</th><th>分類</th><th>成員</th><th>備註</th><th style="text-align:right">金額</th><th></th></tr></thead><tbody>'+rowsHtml+'</tbody></table></div>'+
    (totalPages>1?'<div style="display:flex;justify-content:center;gap:10px;align-items:center;padding:14px;"><button class="btn ghost small" data-action="page-prev"'+(entryFilter.page<=1?" disabled":"")+'>上一頁</button><span style="font-size:12.5px;color:var(--text-soft);">第 '+entryFilter.page+' / '+totalPages+' 頁</span><button class="btn ghost small" data-action="page-next"'+(entryFilter.page>=totalPages?" disabled":"")+'>下一頁</button></div>':'')+
    '</div>';
  bindEntriesFilterEvents();
}
function bindEntriesFilterEvents(){
  function bindChange(id,key){ const el=document.getElementById(id); if(!el) return;
    el.addEventListener("change", ()=>{ entryFilter[key]=el.value; entryFilter.page=1; renderEntriesTab(); });
    if(id==="f_keyword") el.addEventListener("input", ()=>{ entryFilter.keyword=el.value; entryFilter.page=1; renderEntriesTab(); });
  }
  bindChange("f_start","start"); bindChange("f_end","end"); bindChange("f_type","type"); bindChange("f_member","memberId"); bindChange("f_keyword","keyword");
  const clearBtn=document.querySelector("[data-action='clear-filter']");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ entryFilter={start:"",end:"",type:"all",categoryId:"",memberId:"",keyword:"",page:1}; renderEntriesTab(); });
  const pp=document.querySelector("[data-action='page-prev']"); if(pp) pp.addEventListener("click", ()=>{ entryFilter.page--; renderEntriesTab(); });
  const pn=document.querySelector("[data-action='page-next']"); if(pn) pn.addEventListener("click", ()=>{ entryFilter.page++; renderEntriesTab(); });
}

function openEntryForm(entry){
  if(!isMain()){ toast("僅主帳號可以新增或編輯記帳明細","error"); return; }
  const isEdit=!!entry; const type=(entry&&entry.type)||"expense";
  openModal('<button class="modal-close" data-action="modal-close">✕</button>'+
    '<h3>'+(isEdit?"編輯明細":"新增明細")+'</h3><p class="modal-sub">'+(isEdit?"修改這一筆記帳內容":"記錄一筆新的收入或支出")+'</p>'+
    '<form id="entryForm">'+
      '<div class="field"><label>類型</label><div class="pill-toggle" id="ef_type" style="width:100%;">'+
        '<button type="button" data-v="income" class="'+(type==="income"?"active":"")+'" style="flex:1;">收入</button>'+
        '<button type="button" data-v="expense" class="'+(type==="expense"?"active":"")+'" style="flex:1;">支出</button></div></div>'+
      '<div class="field-row"><div class="field"><label for="ef_date">日期</label><input type="date" id="ef_date" value="'+(entry?entry.date:todayStr())+'" required></div>'+
      '<div class="field"><label for="ef_amount">金額</label><input type="number" id="ef_amount" min="1" step="1" value="'+(entry?entry.amount:"")+'" placeholder="0" required></div></div>'+
      '<div class="field-row"><div class="field"><label for="ef_cat">分類</label><select id="ef_cat">'+categoryOptionsHtml(type, entry?entry.categoryId:"")+'</select></div>'+
      '<div class="field"><label for="ef_sub">明細項目</label><select id="ef_sub">'+subOptionsHtml(type, entry?entry.categoryId:"", entry?entry.subId:"")+'</select></div></div>'+
      '<div class="field"><label for="ef_member">所屬成員</label><select id="ef_member">'+memberOptionsHtml(entry?entry.memberId:currentAccount().id)+'</select></div>'+
      '<div class="field"><label for="ef_note">備註（選填）</label><input type="text" id="ef_note" maxlength="60" value="'+escapeHtml(entry?entry.note||"":"")+'" placeholder="例如：超市採買"></div>'+
      '<div class="modal-actions"><button type="button" class="btn ghost" data-action="modal-close">取消</button><button type="submit" class="btn gold">'+(isEdit?"儲存修改":"新增明細")+'</button></div>'+
    '</form>');
  let curType=type;
  document.querySelectorAll("#ef_type button").forEach(btn=>{
    btn.addEventListener("click", ()=>{ curType=btn.getAttribute("data-v");
      document.querySelectorAll("#ef_type button").forEach(b=>b.classList.toggle("active", b===btn));
      document.getElementById("ef_cat").innerHTML=categoryOptionsHtml(curType,""); document.getElementById("ef_sub").innerHTML=subOptionsHtml(curType,"","");
    });
  });
  document.getElementById("ef_cat").addEventListener("change", ()=>{ document.getElementById("ef_sub").innerHTML=subOptionsHtml(curType, document.getElementById("ef_cat").value, ""); });
  document.getElementById("entryForm").addEventListener("submit", async e=>{
    e.preventDefault();
    if(!isMain()){ toast("權限不足：僅主帳號可修改記帳明細","error"); closeModal(); return; }
    const amount=Number(document.getElementById("ef_amount").value);
    const catId=document.getElementById("ef_cat").value;
    const date=document.getElementById("ef_date").value;
    const memberId=document.getElementById("ef_member").value;
    if(!date){ toast("請選擇日期","error"); return; }
    if(!amount||amount<=0){ toast("金額必須大於 0","error"); return; }
    if(!catId){ toast("請選擇分類","error"); return; }
    if(!memberId){ toast("請選擇所屬成員","error"); return; }
    const payload={ type:curType, date, amount, categoryId:catId, subId:document.getElementById("ef_sub").value||null, memberId, note:document.getElementById("ef_note").value.trim() };
    try{
      if(isEdit){ await updateDoc(doc(fbDb,"ledgers",currentLedgerId,"entries",entry.id), {...payload, updatedAt:Date.now()}); toast("已儲存修改","success"); }
      else { await addDoc(collection(fbDb,"ledgers",currentLedgerId,"entries"), {...payload, createdAt:Date.now()}); toast("已新增一筆明細","success"); }
      closeModal();
    }catch(err){ toast("操作失敗："+explainError(err),"error"); }
  });
}
function deleteEntry(id){
  if(!isMain()){ toast("權限不足：僅主帳號可刪除記帳明細","error"); return; }
  showConfirm("確定要刪除這筆明細嗎？此操作無法復原。", async ()=>{
    try{ await deleteDoc(doc(fbDb,"ledgers",currentLedgerId,"entries",id)); toast("已刪除這筆明細","success"); }
    catch(err){ toast("刪除失敗："+explainError(err),"error"); }
  }, {danger:true, confirmLabel:"刪除"});
}

async function addCategory(type){
  if(!isMain()) return;
  const input=document.getElementById("newcat_"+type); const name=input.value.trim();
  if(!name){ toast("請輸入分類名稱","error"); return; }
  if(state.categories[type].some(c=>c.name.toLowerCase()===name.toLowerCase())){ toast("這個分類名稱已經存在","error"); return; }
  state.categories[type].push({id:uid(), name, subs:[]});
  try{ await saveCategories(); toast("已新增分類「"+name+"」","success"); }catch(err){ toast("操作失敗："+explainError(err),"error"); }
}
async function addSub(type,catId,inputEl){
  if(!isMain()) return; const name=inputEl.value.trim();
  if(!name){ toast("請輸入明細項目名稱","error"); return; }
  const cat=state.categories[type].find(c=>c.id===catId); if(!cat) return;
  if(cat.subs.some(s=>s.name.toLowerCase()===name.toLowerCase())){ toast("這個明細項目已經存在","error"); return; }
  cat.subs.push({id:uid(), name});
  try{ await saveCategories(); toast("已新增明細項目「"+name+"」","success"); }catch(err){ toast("操作失敗："+explainError(err),"error"); }
}
async function deleteCategory(type,catId){
  if(!isMain()) return;
  const used=state.entries.filter(en=>en.type===type && en.categoryId===catId).length;
  if(used>0){ toast("此分類目前有 "+used+" 筆明細使用中，請先修改或刪除相關明細後再刪除分類","error"); return; }
  showConfirm("確定要刪除這個分類嗎？相關的明細項目也會一併移除。", async ()=>{
    state.categories[type]=state.categories[type].filter(c=>c.id!==catId);
    try{ await saveCategories(); toast("已刪除分類","success"); }catch(err){ toast("操作失敗："+explainError(err),"error"); }
  }, {danger:true, confirmLabel:"刪除"});
}
async function deleteSub(type,catId,subId){
  if(!isMain()) return;
  const used=state.entries.filter(en=>en.type===type && en.categoryId===catId && en.subId===subId).length;
  if(used>0){ toast("此明細項目目前有 "+used+" 筆明細使用中，請先處理後再刪除","error"); return; }
  const cat=state.categories[type].find(c=>c.id===catId);
  if(cat){ cat.subs=cat.subs.filter(s=>s.id!==subId);
    try{ await saveCategories(); toast("已刪除明細項目","success"); }catch(err){ toast("操作失敗："+explainError(err),"error"); }
  }
}

    const isOwner = ledgerRaw && a.id===normEmail(ledgerRaw.ownerEmail||"");
    return '<tr><td><span class="member-chip"><span class="avatar" style="background:'+avatarColor(a.id)+'">'+escapeHtml((a.name||a.email).charAt(0))+'</span>'+escapeHtml(a.name||a.email)+'<small style="color:var(--text-faint);margin-left:4px;">'+escapeHtml(a.email)+'</small></span></td>'+
      '<td><span class="badge '+(a.role==="main"?"role-main":"role-sub")+'">'+(a.role==="main"?"主帳號":"子帳號")+'</span></td>'+
      '<td><span class="badge '+(a.active?"status-on":"status-off")+'">'+(a.active?"啟用中":"已停用")+'</span></td>'+
      '<td style="color:var(--text-soft);font-size:12.5px;">'+cnt+' 筆明細</td>'+
      '<td>'+(isMain() && !isOwner ? '<div class="row-actions"><button class="btn ghost small" data-action="toggle-active" data-id="'+a.id+'">'+(a.active?"停用":"啟用")+'</button><button class="btn ghost icon" data-action="remove-member" data-id="'+a.id+'">🗑</button></div>' : (isOwner?'<span style="font-size:11.5px;color:var(--text-faint);">帳本建立者</span>':''))+'</td></tr>';
  }).join("");
  document.getElementById("tabContent").innerHTML =
    '<div class="topbar"><div><h1>成員管理</h1><p>主帳號可以加入家人或夥伴的 Google 信箱，邀請他們共同檢視帳本</p></div></div>'+
    (isMain()?"":'<div class="read-only-banner">👁 您目前為子帳號，僅能檢視成員列表，無法新增或修改成員。</div>')+
    '<div class="card" style="margin-bottom:16px;"><div class="table-wrap"><table><thead><tr><th>成員</th><th>身分</th><th>狀態</th><th>記帳數</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
    (isMain()?'<div class="card card-pad"><div class="section-title">新增子帳號</div>'+
      '<p class="field-hint" style="margin-top:0;margin-bottom:14px;">輸入對方平常用來登入 Google 的電子信箱，對方用該帳號登入這個網頁後就能自動看到這個帳本。</p>'+
      '<form id="addMemberForm"><div class="field-row">'+
        '<div class="field"><label for="nm_email">Google 信箱</label><input id="nm_email" type="email" placeholder="example@gmail.com" required></div>'+
        '<div class="field"><label for="nm_name">顯示名稱</label><input id="nm_name" maxlength="20" placeholder="例如：弟弟" required></div></div>'+
      '<button type="submit" class="btn gold">＋ 新增子帳號</button></form></div>':'');
  if(isMain()){
    document.getElementById("addMemberForm").addEventListener("submit", async e=>{
      e.preventDefault();
      const email=normEmail(document.getElementById("nm_email").value);
      const name=document.getElementById("nm_name").value.trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ toast("請輸入有效的電子信箱","error"); return; }
      if(!name){ toast("請輸入顯示名稱","error"); return; }
      if(ledgerRaw.members[email]){ toast("這個信箱已經在成員名單中","error"); return; }
      const newMembers={...ledgerRaw.members, [email]:{name, role:"sub", active:true}};
      try{ await saveMembers(newMembers); toast("已新增子帳號「"+name+"」","success"); document.getElementById("nm_email").value=""; document.getElementById("nm_name").value=""; }
      catch(err){ toast("操作失敗："+explainError(err),"error"); }
    });
  }
}
async function toggleActive(id){
  if(!ledgerRaw.members[id] || id===normEmail(ledgerRaw.ownerEmail||"")) return;
  const newMembers={...ledgerRaw.members}; newMembers[id]={...newMembers[id], active: !newMembers[id].active};
  try{ await saveMembers(newMembers); toast(newMembers[id].active?"已啟用此帳號":"已停用此帳號","success"); }
  catch(err){ toast("操作失敗："+explainError(err),"error"); }
}
function removeMember(id){
  if(!ledgerRaw.members[id] || id===normEmail(ledgerRaw.ownerEmail||"")) return;
  const used=state.entries.filter(en=>en.memberId===id).length;
  if(used>0){ toast("此成員尚有 "+used+" 筆明細紀錄，請先將這些明細改為其他成員後再移除","error"); return; }
  const name=ledgerRaw.members[id].name||id;
  showConfirm("確定要移除「"+name+"」嗎？此操作無法復原。", async ()=>{
    const newMembers={...ledgerRaw.members}; delete newMembers[id];
    try{ await saveMembers(newMembers); toast("已移除此成員","success"); }
    catch(err){ toast("操作失敗："+explainError(err),"error"); }
  }, {danger:true, confirmLabel:"移除"});
}

/* =========================================================
   備份與帳本分頁
========================================================= */
function renderBackupTab(){
  document.getElementById("tabContent").innerHTML =
    '<div class="topbar"><div><h1>備份與帳本</h1><p>資料已即時同步到 Firebase 雲端，這裡可以下載備份或管理帳本</p></div></div>'+
    '<div class="card card-pad">'+
      '<div class="backup-row"><div class="info"><strong>匯出備份檔</strong><span>下載目前帳本的成員、分類與記帳明細，存成 JSON 檔</span></div><button class="btn gold" data-action="export-backup">下載備份檔</button></div>'+
      '<div class="backup-row"><div class="info"><strong>切換帳本</strong><span>如果你加入了多個帳本，可以在這裡切換</span></div><button class="btn ghost" data-action="switch-ledger">切換帳本</button></div>'+
      (isMain()?'<div class="backup-row"><div class="info"><strong>刪除這個帳本</strong><span>永久刪除這個帳本與所有記帳明細，所有成員都會失去存取權</span></div><button class="btn danger" data-action="delete-ledger">刪除帳本</button></div>':'')+
    '</div>';
  document.querySelector("[data-action='export-backup']").addEventListener("click", ()=>{
    const payload={ ledger:{name:ledgerRaw.name, members:ledgerRaw.members, categories:ledgerRaw.categories}, entries:state.entries, exportedAt:new Date().toISOString() };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); const d=new Date();
    a.href=url; a.download="共同記帳備份_"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast("備份檔已下載","success");
  });
  const delBtn=document.querySelector("[data-action='delete-ledger']");
  if(delBtn) delBtn.addEventListener("click", ()=>{
    showConfirm("這將永久刪除這個帳本與所有記帳明細，且無法復原。確定要繼續嗎？", async ()=>{
      try{
        const entriesSnap=await getDocs(collection(fbDb,"ledgers",currentLedgerId,"entries"));
        await Promise.all(entriesSnap.docs.map(d=>deleteDoc(d.ref)));
        await deleteDoc(doc(fbDb,"ledgers",currentLedgerId));
        toast("帳本已刪除","success");
        teardownLedger(); enterLedgerFlow();
      }catch(err){ toast("刪除失敗："+explainError(err),"error"); }
    }, {danger:true, confirmLabel:"刪除帳本"});
  });
}

/* =========================================================
   事件委派
========================================================= */
document.addEventListener("click", function(e){
  const t=e.target.closest("[data-action]"); if(!t) return;
  const action=t.getAttribute("data-action"); const id=t.getAttribute("data-id");
  switch(action){
    case "modal-close": closeModal(); break;
    case "logout": signOut(fbAuth); break;
    case "switch-ledger": switchLedgerPrompt(); break;
    case "add-entry": openEntryForm(null); break;
    case "edit-entry": { const en=state.entries.find(x=>x.id===id); if(en) openEntryForm(en); break; }
    case "delete-entry": deleteEntry(id); break;
    case "add-cat": addCategory(t.getAttribute("data-type")); break;
    case "del-cat": deleteCategory(t.getAttribute("data-type"), t.getAttribute("data-cat")); break;
    case "add-sub": { const type=t.getAttribute("data-type"), catId=t.getAttribute("data-cat"); const input=document.querySelector('[data-cat-input="'+catId+'"]'); if(input) addSub(type,catId,input); break; }
    case "del-sub": deleteSub(t.getAttribute("data-type"), t.getAttribute("data-cat"), t.getAttribute("data-sub")); break;
    case "toggle-active": toggleActive(id); break;
    case "remove-member": removeMember(id); break;
  }
});
document.getElementById("navTabs").addEventListener("click", e=>{ const btn=e.target.closest(".tab-btn"); if(btn) switchTab(btn.getAttribute("data-tab")); });

/* =========================================================
   啟動
========================================================= */
function boot(){
  const cfgRaw=localStorage.getItem(FB_CONFIG_KEY);
  if(!cfgRaw){ renderConfigScreen(); return; }
  let cfg;
  try{ cfg=JSON.parse(cfgRaw); }catch(e){ localStorage.removeItem(FB_CONFIG_KEY); renderConfigScreen(); return; }
  try{
    fbApp=initializeApp(cfg); fbAuth=getAuth(fbApp); fbDb=getFirestore(fbApp); googleProvider=new GoogleAuthProvider();
  }catch(err){ toast("Firebase 初始化失敗："+explainError(err),"error"); localStorage.removeItem(FB_CONFIG_KEY); renderConfigScreen(); return; }

  onAuthStateChanged(fbAuth, user=>{
    fbUser=user;
    if(!user){ teardownLedger(); renderAuthScreen(); return; }
    enterLedgerFlow();
  });
}
boot();
</script>
